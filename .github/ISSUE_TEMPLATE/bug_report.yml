name: Bug Report
description: Report a data, UX, or runtime bug.
title: "[bug]: "
labels: [bug]
body:
  - type: textarea
    id: issue
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
    validations:
      required: true
